# nginx config for chess.sidastuff.com (Node API backend)
# The frontend SPA is on Netlify (chess.singdevelopments.com).
# Backend is API-only: SERVE_STATIC=0, TRUST_PROXY=1.

upstream chess_api {
    # PM2 cluster mode runs 2 instances by default on port 3000.
    # Use least_conn for SSE — keeps long-lived streams balanced.
    least_conn;
    server 127.0.0.1:3000;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name chess.sidastuff.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chess.sidastuff.com;

    # ── SSL (Let's Encrypt / certbot) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/chess.sidastuff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess.sidastuff.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Security headers (complement the Express helmet equivalents) ──
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Real IP from Cloudflare ───────────────────────────────────────
    # TRUST_PROXY=1 on the Node side makes it read X-Forwarded-For.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Health check (no auth, no buffering) ──────────────────────────
    location /health {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Static vendor files (Stockfish WASM, served from Node) ───────
    # Browser workers load these cross-origin from chess.singdevelopments.com.
    # Already has CORS headers set by Express middleware, but nginx must not
    # strip them or buffer the (small) WASM binaries.
    location /vendor/ {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WASM is small (<5 MB) and immutable; cache aggressively.
        proxy_cache off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # CORS for cross-origin worker loads
        add_header Access-Control-Allow-Origin "https://chess.singdevelopments.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # ── API: SSE streaming endpoints ──────────────────────────────────
    # Coach chat (/api/coach/chat), server review (/api/analyze/stream),
    # anticheat (/api/anticheat/stream), and user stream (/api/users/me/stream)
    # all use SSE and can run 2-10+ minutes. CRITICAL: no buffering.
    #
    # POST /api/coach/chat         — LLM streaming, tool loop, 10 min typical
    # POST /api/coach/tool-result  — browser tool result callback, short
    # POST /api/analyze/stream     — server review, up to 500 plies
    # POST /api/anticheat/stream   — anticheat analysis, multi-game
    # GET  /api/users/me/stream    — presence heartbeat, 15 min max
    #
    # The Node app already sends X-Accel-Buffering: no on stream responses,
    # but setting it here too is defense in depth.
    location /api/coach/chat {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — no buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;

        # Cloudflare: ensure no proxy buffering
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    location /api/anticheat/stream {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    location /api/analyze/stream {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    location /api/users/me/stream {
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;  # 5 min — server caps at 15 min but heartbeats every 20s
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # ── API: regular (non-streaming) endpoints ─────────────────────────
    # POST /api/analyze       — short analysis request
    # GET  /api/puzzle        — puzzle fetch
    # GET  /api/opening-explorer — opening stats
    # GET  /api/recent-games  — recent games
    # GET  /api/public-stats  — public stats
    # GET  /api/profile/:username — player profile
    # GET  /api/users/me      — auth/profile fetch
    # POST /api/users/me      — profile update
    # POST /api/puzzle/solve  — puzzle solve
    # POST /api/anticheat     — short anticheat submit
    # POST /api/auth/ban-status — ban check
    # POST /api/coach/tool-result — short browser-tool callback
    # POST /api/admin/*       — admin endpoints
    # POST /api/contact       — contact form
    # POST /api/site/visit    — analytics ping
    #
    # These are short requests (sub-second to a few seconds). Standard
    # buffering is fine and slightly more efficient.
    location /api/ {
        # Exclude SSE-stream locations (caught by the more-specific patterns above).
        # This catches everything else under /api/.
        proxy_pass http://chess_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── CORS preflight for /vendor (not caught by /api/ rule above) ───
    location = /vendor/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://chess.singdevelopments.com" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Request size & body limits ─────────────────────────────────────
    client_max_body_size 2m;
    client_body_buffer_size 128k;

    # ── Logging ────────────────────────────────────────────────────────
    access_log /var/log/nginx/chess.sidastuff.com.access.log;
    error_log  /var/log/nginx/chess.sidastuff.com.error.log warn;

    # ── Rate limiting zone (optional, defense in depth) ────────────────
    # Uncomment and adjust the burst if you want nginx-level throttling.
    # The Node app has its own rate limiter (180 req/min per IP on /api,
    # tighter limits on specific endpoints).
    #
    # limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    # location /api/ { limit_req zone=api_zone burst=60 nodelay; ... }
}