<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account | SiDaStuff Chess</title>
  <link rel="icon" type="image/png" href="./assets/logo.png">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet" crossorigin="anonymous">
</head>
<body class="standalone-body" data-page="account">
  <div data-site-header></div>
  <div class="standalone-shell">
    <main class="standalone-main">
      <section class="card standalone-card">
        <h1>Account</h1>
        <div id="account-signed-out-page" hidden>
          <p>Sign in to view your plan, usage, and puzzle rating.</p>
          <div class="standalone-actions">
            <a class="btn btn-primary" href="/signin.html">Sign In</a>
            <a class="btn btn-secondary" href="/signup.html">Create Account</a>
          </div>
        </div>
        <div id="account-signed-in-page" hidden>
          <div class="account-profile-row">
            <div class="account-avatar material-symbols-outlined" aria-hidden="true">person</div>
            <div>
              <strong id="account-display-name">Player</strong>
              <span id="account-email-label"></span>
            </div>
          </div>
          <div class="standalone-grid">
            <div class="standalone-stat"><span>Plan</span><strong id="account-plan">Free</strong></div>
            <div class="standalone-stat"><span>Puzzle rating</span><strong id="account-puzzle-rating">1500</strong></div>
            <div class="standalone-stat"><span>Solved</span><strong id="account-puzzles-solved">0</strong></div>
            <div class="standalone-stat"><span>Attempted</span><strong id="account-puzzles-attempted">0</strong></div>
          </div>
          <p class="account-usage" id="account-usage"></p>
          <div class="admin-boost-panel" id="admin-boost-panel" hidden>
            <h3>Gift Boost</h3>
            <label class="field"><span class="field-label">Email</span><input id="gift-boost-email" class="input-select" type="email" placeholder="player@example.com"></label>
            <label class="field"><span class="field-label">Days</span><input id="gift-boost-days" class="input-select" type="number" min="1" max="366" value="30"></label>
            <button id="btn-gift-boost" class="btn btn-primary" type="button">Gift Boost</button>
          </div>
          <div class="admin-ban-panel" id="admin-ban-panel" hidden>
            <h3>Ban / Unban Player</h3>
            <label class="field"><span class="field-label">Email</span><input id="ban-user-email" class="input-select" type="email" placeholder="player@example.com"></label>
            <label class="field"><span class="field-label">Reason</span><input id="ban-user-reason" class="input-select" type="text" placeholder="Policy violation or abuse"></label>
            <div class="standalone-actions">
              <button id="btn-ban-user" class="btn btn-primary" type="button">Ban User</button>
              <button id="btn-unban-user" class="btn btn-secondary" type="button">Unban User</button>
            </div>
          </div>
          <div class="standalone-actions">
            <button id="btn-reset-password" class="btn btn-secondary" type="button">Reset Password</button>
            <button id="btn-signout" class="btn btn-secondary" type="button">Sign Out</button>
          </div>
        </div>
        <p class="account-status" id="page-status"></p>
      </section>
    </main>
  </div>
  <div data-site-footer></div>
  <div class="modal-overlay app-loading-overlay" id="app-loading-overlay" style="display:none">
    <div class="modal modal-loading" role="status" aria-live="polite">
      <div class="modal-body"><div class="modal-loading-spinner" aria-hidden="true"></div><h2>Loading</h2><p id="app-loading-text">Loading profile...</p></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js" crossorigin="anonymous"></script>
  <script src="./js/header.js"></script>
  <script src="./js/footer.js"></script>
  <script src="./js/page-auth.js"></script>
</body>
</html>
