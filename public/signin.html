<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading | SiDaStuff Chess</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="./assets/logo.png">
  <script>
    // The SPA lives at / and serves every route client-side.
    // This page is only used for legacy direct links and crawlers.
    (function () {
      try {
        var path = (window.location.pathname || '/').replace(/\.html$/i, '').replace(/\/+$/, '') || '/';
        if (path === '/index') path = '/';
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        // Pass the original route via ?spa-route so the SPA can restore it after loading.
        if (path !== '/' && !/[?&]spa-route=/.test(search)) {
          search += (search.indexOf('?') >= 0 ? '&' : '?') + 'spa-route=' + encodeURIComponent(path);
        }
        window.location.replace('/' + search + hash);
      } catch (err) {
        window.location.replace('/');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/">
  </noscript>
</head>
<body>
  <p>Redirecting to <a href="/">SiDaStuff Chess</a>...</p>
</body>
</html>
