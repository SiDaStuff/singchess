server {
    listen 80;
    server_name chess.sidastuff.com;

    # Redirect HTTP → HTTPS (safe)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chess.sidastuff.com;

    root /home/ubuntu/singchess/public;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/chess.sidastuff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess.sidastuff.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Prevent /index loop
    location = /index {
        return 301 /;
    }

    location = /index.html {
        return 301 /;
    }

    # Strip .html from URLs (e.g. /review.html -> /review)
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
